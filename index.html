<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏍️</text></svg>">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Velocity Moto</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/main.css">
    <!-- CrazyGames SDK v3 (no-ops gracefully on non-CG domains) -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  </head>
  <body>
    <!-- 3D Canvas Container -->
    <div id="game-container"></div>
    
    <!-- UI Overlay (HUD) -->
    <div id="ui-layer">
      <div id="hud-playing" class="screen hidden">
        <div id="mission-text" class="mission-text"></div>
        <div class="hud-top-left">
          <div id="speedometer"><span id="speed-val">0</span> <small>km/h</small></div>
          <div id="fuel-gauge">Fuel: <div class="bar-bg"><div class="bar-fill" id="fuel-fill"></div></div></div>
        </div>
        <div class="hud-top-right">
          <div id="score">Score: <span id="score-val">0</span></div>
          <div id="coins" style="color:#ffcc00; font-weight:bold; font-size: 20px;">Coins: <span id="coins-val">0</span></div>
          <div id="nitro-gauge">Nitro: <div class="bar-bg"><div class="bar-fill nitro" id="nitro-fill"></div></div></div>
        </div>
        <!-- HUD buttons row (below score) -->
        <div class="hud-btn-row">
          <button id="btn-mute" title="Toggle Sound" class="hud-icon-btn">🔊</button>
          <button id="btn-camera" title="Toggle Camera" class="hud-icon-btn">📷</button>
        </div>
        <!-- CG Username -->
        <div id="cg-user"
          style="position:absolute; top:10px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.7); font-size:14px; display:none;">
        </div>
      </div>
      
      <!-- Menus (Main, Game Over, etc.) -->
      <div id="menu-start" class="screen active" style="
        justify-content: flex-start; 
        padding-top: 10vh; 
        background-color: #000;
      ">
        <!-- Animated bike background -->
        <canvas id="menu-bg-canvas"></canvas>
        
        <h1 class="menu-title">VELOCITY MOTO</h1>
        <div class="menu-subtitle">THE ULTIMATE HIGHWAY RUSH</div>
        <div class="menu-buttons-wrap">
          <button id="btn-start" class="btn-start-main">START MISSION</button>
          <div class="menu-btn-row">
            <button id="btn-garage" class="menu-btn"
              style="background: linear-gradient(45deg, #1a1a2e, #2a2a4a); border-color: #4a4a7a;">GARAGE</button>
            <button id="btn-missions" class="menu-btn"
              style="background: linear-gradient(45deg, #2e1a2e, #4a2a2a); border-color: #7a4a4a;">MISSIONS</button>
            <button id="btn-tracks" class="menu-btn"
              style="background: linear-gradient(45deg, #1a2e1a, #2a4a2a); border-color: #4a7a4a;">TRACKS</button>
            <button id="btn-daily" class="menu-btn"
              style="background: linear-gradient(45deg, #2e2e1a, #4a4a2a); border-color: #7a7a4a;">DAILY</button>
          </div>
          
          <div class="menu-bank">
            BANK: <span id="menu-coins" style="color: white;">0</span> COINS
          </div>
        </div>
        
        <div class="menu-controls-hint">
          <p style="margin: 0;">CONTROLS: <span style="color:#fff">[WASD]</span> or <span style="color:#fff">Arrows</span>
            &bull; <span style="color:#fff">[C]</span> Camera &bull; <span style="color:#fff">[SPACE]</span> Nitro &bull; <span
              style="color:#fff">[SHIFT]</span> Brake</p>
        </div>
        <!-- Sound toggle on main menu -->
        <button id="btn-mute-menu" title="Toggle Sound" class="hud-icon-btn"
          style="position:absolute; top:15px; right:15px; z-index:10;">🔊</button>
        <!-- Banner container for main menu -->
        <div id="banner-menu" style="position:absolute; bottom:60px; right:10px; width:300px; height:250px;"></div>
      </div>

      <div id="menu-garage" class="screen hidden no-bg">
  <!-- Garage top bar -->
  <div class="garage-topbar">
    <div class="garage-topbar-left">
      <h1 class="garage-title">GARAGE</h1>
      <button id="btn-garage-back" class="garage-back-btn">BACK</button>
    </div>
    <div class="garage-coins-badge">
      BANK: <span id="garage-coins">0</span>
    </div>
  </div>

  <!-- Prev / Next arrows (positioned around bike viewport) -->
  <button id="btn-prev-bike" class="garage-nav-btn garage-nav-prev">&lt;</button>
  <button id="btn-next-bike" class="garage-nav-btn garage-nav-next">&gt;</button>

  <!-- Paint picker -->
  <div class="garage-paint">
    <span>PAINT</span>
    <input type="color" id="garage-color-picker">
  </div>

  <!-- Stats / buy / upgrade panel -->
  <div id="bike-info-panel" class="garage-info-panel"></div>
</div>

      <!-- Tracks Menu -->
      <div id="menu-tracks" class="screen hidden" style="background-color: rgba(0, 30, 0, 0.9);">
        <h1 class="tracks-title">SELECT TRACK</h1>
        <div style="margin-bottom: 15px; font-weight: bold; color: #ffcc00; font-size: clamp(14px, 2.5vw, 20px);">Total Coins:
          <span id="tracks-coins">0</span></div>
        <div id="track-list" class="track-list-grid"></div>
        <button id="btn-tracks-back" class="menu-btn"
          style="background: linear-gradient(45deg, #222, #444); border: 2px solid #666; margin-top: 15px;">BACK TO
          MENU</button>
      </div>

      <!-- Missions Menu -->
      <div id="menu-missions" class="screen hidden" style="background-color: rgba(20, 0, 20, 0.9);">
  <h1 style="color: #ff55ff; text-shadow: 0 0 10px #ff00ff;">MISSION BOARD</h1>
  
  <div id="missions-list-container" style="display:flex; flex-direction:column; gap:20px; max-width:800px; width:90%; max-height: 60%; overflow-y: auto;">
    <!-- Generated by JS -->
  </div>
  
  <button id="btn-missions-back" style="background: linear-gradient(45deg, #222, #444); border: 2px solid #666; padding: 15px 40px; font-size: 20px; margin-top:30px;">BACK TO MENU</button>
</div>

      <!-- Daily Rewards Menu -->
      <div id="menu-daily" class="screen hidden" style="background-color: rgba(20, 20, 0, 0.95);">
        <h1 style="color: #ffcc00; text-shadow: 0 0 10px #ffaa00; margin-bottom: 10px;">DAILY REWARDS</h1>
        <div id="daily-content"
          style="display:flex; flex-direction:column; gap:20px; max-width:900px; width:95%; max-height:70vh; overflow-y:auto;">
        </div>
        <button id="btn-daily-back"
          style="background: linear-gradient(45deg, #222, #444); border: 2px solid #666; padding: 15px 40px; font-size: 20px; margin-top:20px;">BACK
          TO MENU</button>
      </div>

      <div id="menu-gameover" class="screen hidden" style="
        background-color: #000;
        background-image: linear-gradient(180deg, rgba(200, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.9) 100%);
      ">
        <h1
          style="font-size: clamp(40px, 10vw, 80px); color: #ff3333; text-shadow: 0 0 20px rgba(255,0,0,0.8); margin-bottom: 20px;">
          CRASHED!</h1>
        <div
          style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 1px solid #550000; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px; max-width: 90%;">
          <p style="font-size: clamp(20px, 4vw, 32px); margin: 0; color: white;">Final Score: <span id="final-score"
              style="color: #00aaff; font-weight: bold;">0</span></p>
          <p style="font-size: clamp(18px, 3.5vw, 28px); margin: 0; color: white;">Coins Collected: <span id="final-coins"
              style="color: #ffcc00; font-weight: bold;">0</span></p>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; padding: 0 10px;">
          <button id="btn-restart"
            style="padding: 15px 30px; font-size: clamp(16px, 3vw, 28px); background: linear-gradient(45deg, #aa0000, #ff3333); border: 2px solid #ffaaaa; box-shadow: 0 0 20px rgba(255,0,0,0.5);">RETRY
            RACE</button>
          <button id="btn-double-coins"
            style="padding: 15px 30px; font-size: clamp(14px, 2.5vw, 22px); background: linear-gradient(45deg, #cc9900, #ffcc00); border: 2px solid #ffe066; color: #000; box-shadow: 0 0 20px rgba(255,204,0,0.4); display:none;">🎬
            DOUBLE COINS</button>
          <button id="btn-to-main"
            style="padding: 15px 30px; font-size: clamp(14px, 3vw, 24px); background: linear-gradient(45deg, #222, #444); border: 2px solid #666;">MAIN
            MENU</button>
        </div>
        <!-- Banner on game over -->
        <div id="banner-gameover" style="margin-top:20px; width:728px; height:90px;"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
